server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    root /usr/share/nginx/html;
    index index.html;

    # /api/html/ 用于暴露 docs/ppt-html 下的静态答辩页。
    # 使用 ^~ 提前命中，避免继续落到后面的 /api/ 反向代理。
    location ^~ /api/html/ {
        alias /usr/share/nginx/html/api/html/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # /defense/ 是对外展示用的更短地址，指向同一份答辩静态页。
    location ^~ /defense/ {
        alias /usr/share/nginx/html/api/html/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 前端是单页应用，未命中静态文件时回退到 index.html。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api 下的请求统一转发给 docker compose 中名为 api 的后端容器。
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://api:8000/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://api:8000/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 上传文件由后端提供，仍通过 nginx 对外暴露统一域名。
    location /uploads/ {
        proxy_pass http://api:8000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
